# Install suse packages
- name: Check if SUSE packages "{{ suse_packages }}" are installed
  become: true
  shell: |
    rpm -q {{ suse_packages | join(' ') }}
  register: rpm_check
  changed_when: false
  failed_when: false
  when: suse_packages | length > 0

- name: Wait for system management lock to be released
  become: true
  command: zypper --non-interactive ps
  register: lock_check
  retries: 5
  delay: 15
  until: lock_check.rc == 0
  failed_when:
    - lock_check.rc != 0
    - "'System management is locked by the application' not in lock_check.stderr"
  ignore_errors: true

- name: Install SUSE packages "{{ suse_packages }}" {{ ansible_facts['distribution'] }}
  become: true
  shell: |
    {% if ansible_facts['distribution'] == "SL-Micro" -%}
    transactional-update --continue -n pkg install --auto-agree-with-licenses {{ suse_packages | join(' ') }}
    {% else %}
    zypper --non-interactive install {{ suse_packages | join(' ') }}
    {% endif %}
  register: install_suse_packages
  retries: 5
  delay: 60
  when:
    - suse_packages | length > 0
    - rpm_check.rc != 0   # run only if rpm -q failed for any package
  notify: Reboot after update #Reboot handler in roles/common
